<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remedy DS — Component Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f7f7;
  --bg-accent: #cdcbc8;
  --surface: #ffffff;
  --text: #1f1f1f;
  --text-2: #666666;
  --text-3: #999999;
  --pill-bg: #e5e5e5;
  --pill-text: #666666;
  --border: #e5e5e5;
  --remedy-green: #00853D;
  --remedy-blue: #005897;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Inter', system-ui, sans-serif;
  --mono: 'DM Mono', monospace;
  --r-full: 999px;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
nav { position: sticky; top: 0; z-index: 100; background: rgba(247,247,247,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 48px; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.wordmark { font-family: var(--serif); font-size: 17px; font-weight: 400; color: var(--text); text-decoration: none; }
.wordmark em { font-style: italic; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); color: var(--pill-text); background: var(--pill-bg); border-radius: 6px; padding: 4px 10px; }
.nav-pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--remedy-green); flex-shrink: 0; }
.nav-cta { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; color: #fff; background: var(--text); border-radius: 8px; padding: 7px 14px; text-decoration: none; transition: opacity 0.15s; }
.nav-cta:hover { opacity: 0.75; }
.hero { max-width: 1200px; margin: 0 auto; padding: 80px 48px 56px; display: grid; grid-template-columns: 1fr auto; align-items: end; gap: 64px; }
.hero-label { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); margin-bottom: 20px; }
.hero-label::before { content: ''; width: 16px; height: 1px; background: currentColor; }
.hero h1 { font-family: var(--serif); font-size: clamp(38px, 5vw, 58px); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 18px; }
.hero h1 em { font-style: italic; }
.hero-desc { font-size: 14px; color: var(--text-2); line-height: 1.75; max-width: 400px; }
.hero-stats { display: flex; gap: 0; padding-bottom: 6px; flex-shrink: 0; opacity: 0; transition: opacity 0.5s; }
.hero-stats.show { opacity: 1; }
.stat { padding: 0 28px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 4px; text-align: right; }
.stat:first-child { padding-left: 0; border-left: none; }
.stat-n { font-family: var(--serif); font-size: 44px; font-weight: 400; line-height: 1; letter-spacing: -0.03em; }
.stat-l { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); }
.divider-band { background: var(--bg-accent); border-top: 1px solid #b8b6b3; border-bottom: 1px solid #b8b6b3; padding: 14px 48px; }
.divider-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.divider-inner input { background: transparent; border: none; outline: none; font-size: 13px; font-family: var(--sans); color: var(--text); flex: 1; max-width: 280px; }
.divider-inner input::placeholder { color: #999; }
.divider-sep { width: 1px; height: 16px; background: #b8b6b3; flex-shrink: 0; }
.filter-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.fpill { font-size: 11px; font-weight: 500; padding: 5px 14px; border-radius: var(--r-full); border: 1px solid #b8b6b3; background: transparent; color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.fpill.active { background: var(--text); color: #fff; border-color: var(--text); }
.fpill:hover:not(.active) { background: rgba(0,0,0,0.07); }
.search-icon-wrap { position: relative; }
.search-icon-wrap svg { position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
.search-icon-wrap input { padding-left: 20px; }
.content { max-width: 1200px; margin: 0 auto; padding: 40px 48px 96px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-name { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-3); }
.section-count { font-size: 11px; font-family: var(--mono); color: var(--text-3); background: var(--pill-bg); padding: 1px 7px; border-radius: 4px; }
.comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 48px; }
.comp-card { background: var(--surface); border-radius: 20px; text-decoration: none; color: inherit; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s; }
.comp-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.10); }
.card-preview { height: 200px; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background-image: radial-gradient(circle, rgba(0,0,0,0.07) 1px, transparent 1px); background-size: 18px 18px; }
.card-preview-inner { transform-origin: center; pointer-events: none; user-select: none; }
.card-body { padding: 20px 24px 24px; }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-cat { font-size: 11px; font-family: var(--mono); color: var(--text-3); }
.card-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 500; background: var(--pill-bg); color: var(--text-2); padding: 3px 8px; border-radius: 6px; }
.card-badge.pub { background: rgba(0,133,61,0.1); color: var(--remedy-green); }
.card-badge-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.card-name { font-family: var(--serif); font-size: 18px; font-weight: 400; letter-spacing: -0.01em; color: var(--text); margin-bottom: 4px; line-height: 1.2; }
.card-variant { display: inline-block; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-2); background: var(--pill-bg); padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
.card-desc { font-size: 12px; color: var(--text-2); line-height: 1.6; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.empty { grid-column: 1/-1; text-align: center; padding: 96px 40px; color: var(--text-3); }
.empty p { font-size: 14px; margin-top: 12px; font-style: italic; font-family: var(--serif); }
footer { background: var(--bg-accent); border-top: 1px solid #b8b6b3; padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-2); }
footer span { font-family: var(--mono); font-size: 11px; }
</style>
</head>
<body>
<nav>
  <a class="wordmark" href="index.html"><em>Remedy</em> DS</a>
  <div class="nav-right">
    <div class="nav-pill"><span class="nav-pill-dot"></span><span id="token-label">Loading…</span></div>
    <a class="nav-cta" href="https://github.com/hemanthkotla-codes/remedy-specs" target="_blank">GitHub →</a>
  </div>
</nav>
<section class="hero">
  <div>
    <div class="hero-label">Component Library</div>
    <h1>Design tokens.<br><em>Built to spec.</em></h1>
    <p class="hero-desc">Loblaw Digital · Remedy Design System. Anatomy, spacing, colour tokens and interactive specs for every component.</p>
  </div>
  <div class="hero-stats" id="hero-stats">
    <div class="stat"><div class="stat-n" id="stat-total">—</div><div class="stat-l">Components</div></div>
    <div class="stat"><div class="stat-n" id="stat-cats">—</div><div class="stat-l">Categories</div></div>
    <div class="stat"><div class="stat-n" id="stat-pub">—</div><div class="stat-l">Published</div></div>
  </div>
</section>
<div class="divider-band">
  <div class="divider-inner">
    <div class="search-icon-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search components…" oninput="filter()">
    </div>
    <div class="divider-sep"></div>
    <div class="filter-pills" id="pills"></div>
  </div>
</div>
<div class="content"><div id="sections"></div></div>
<footer>
  <span>Remedy Design System · Loblaw Digital</span>
  <span id="footer-token">—</span>
</footer>
<script>
let all = [], activeCat = 'all';
async function init() {
  const data = await fetch('data/components.json').then(r => r.json());
  all = data.components;
  document.getElementById('token-label').textContent = data._meta.tokenSet;
  document.getElementById('footer-token').textContent = data._meta.tokenSet;
  const pub = all.filter(c => c.status === 'published').length;
  const cats = [...new Set(all.map(c => c.category))].length;
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-cats').textContent = cats;
  document.getElementById('stat-pub').textContent = pub;
  setTimeout(() => document.getElementById('hero-stats').classList.add('show'), 100);
  const catList = ['All', ...new Set(all.map(c => c.category))];
  const pillsEl = document.getElementById('pills');
  catList.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'fpill' + (cat === 'All' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCat = cat === 'All' ? 'all' : cat; document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active')); btn.classList.add('active'); filter(); };
    pillsEl.appendChild(btn);
  });
  render(all);
}
function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = all.filter(c => { const mc = activeCat === 'all' || c.category === activeCat; const mq = !q || [c.name, c.variant, c.description].some(t => t?.toLowerCase().includes(q)); return mc && mq; });
  render(filtered);
}
function render(components) {
  const el = document.getElementById('sections'); el.innerHTML = '';
  if (!components.length) { el.innerHTML = '<div class="comp-grid"><div class="empty"><p>No components found.</p></div></div>'; return; }
  const byCat = {};
  components.forEach(c => { (byCat[c.category] = byCat[c.category] || []).push(c); });
  Object.entries(byCat).forEach(([cat, comps]) => {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-head"><span class="section-name">${cat}</span><span class="section-count">${comps.length}</span></div>`;
    const grid = document.createElement('div'); grid.className = 'comp-grid';
    comps.forEach(comp => {
      const card = document.createElement('a'); card.className = 'comp-card'; card.href = `spec.html?id=${comp.id}`;
      const isPub = comp.status === 'published';
      const html = comp.devModeHtml ? comp.devModeHtml.replace(/\{\{ID\}\}/g, 'p-' + comp.id) : '';
      card.innerHTML = `<div class="card-preview"><div class="card-preview-inner">${html}</div></div><div class="card-body"><div class="card-top"><span class="card-cat">${comp.category}</span><span class="card-badge ${isPub ? 'pub' : ''}"><span class="card-badge-dot"></span>${isPub ? 'Published' : 'Draft'}</span></div><div class="card-name">${comp.name}${comp.variant ? `<span class="card-variant">${comp.variant}</span>` : ''}</div><p class="card-desc">${comp.description || ''}</p></div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid); el.appendChild(sec);
  });
  requestAnimationFrame(scalePreviews);
}
function scalePreviews() {
  document.querySelectorAll('.card-preview-inner').forEach(inner => {
    if (!inner.firstElementChild) return;
    const c = inner.closest('.card-preview'); inner.style.transform = 'none';
    const scale = Math.min((c.clientWidth-40)/inner.scrollWidth, (c.clientHeight-20)/inner.scrollHeight, 0.5);
    if (scale > 0) inner.style.transform = `scale(${scale})`;
  });
}
window.addEventListener('resize', scalePreviews);
init();
</script>
</body>
</html>
